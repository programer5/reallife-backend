services:
  reallife-mysql:
    image: mysql:8.4
    container_name: reallife-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - reallife_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: reallife-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: reallife-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTIC_ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    volumes:
      - reallife_elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: reallife-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reallife-app
    restart: unless-stopped
    depends_on:
      - reallife-mysql
      - redis
      - elasticsearch
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}

      DB_URL: jdbc:mysql://reallife-mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SEARCH_ELASTIC_ENABLED: ${SEARCH_ELASTIC_ENABLED:-true}
      SEARCH_ELASTIC_BASE_URL: ${SEARCH_ELASTIC_BASE_URL:-http://elasticsearch:9200}
      SEARCH_ELASTIC_INDEX_NAME: ${SEARCH_ELASTIC_INDEX_NAME:-reallife_search}
      SEARCH_ELASTIC_API_KEY: ${SEARCH_ELASTIC_API_KEY:-}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXP_MINUTES: ${JWT_ACCESS_TOKEN_EXP_MINUTES}
      JWT_REFRESH_TOKEN_EXP_DAYS: ${JWT_REFRESH_TOKEN_EXP_DAYS}

      FILE_UPLOAD_DIR: /app/uploads

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}

      APP_COOKIE_SAME_SITE: ${APP_COOKIE_SAME_SITE:-Lax}
      APP_COOKIE_SECURE_MODE: ${APP_COOKIE_SECURE_MODE:-false}
      APP_COOKIE_DOMAIN: ${APP_COOKIE_DOMAIN:-}

      APP_VERSION: ${APP_VERSION:-dev}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}

      OPS_ALERT_ENABLED: ${OPS_ALERT_ENABLED:-false}
      OPS_ALERT_SLACK_WEBHOOK_URL: ${OPS_ALERT_SLACK_WEBHOOK_URL:-}
      OPS_ALERT_SLACK_USERNAME: ${OPS_ALERT_SLACK_USERNAME:-RealLife Ops}
      OPS_ALERT_SLACK_ICON_EMOJI: ${OPS_ALERT_SLACK_ICON_EMOJI:-:rotating_light:}
      OPS_ALERT_COOLDOWN_MINUTES: ${OPS_ALERT_COOLDOWN_MINUTES:-10}
      OPS_ALERT_HEALTH_CHECK_INITIAL_DELAY_MS: ${OPS_ALERT_HEALTH_CHECK_INITIAL_DELAY_MS:-15000}
      OPS_ALERT_HEALTH_CHECK_FIXED_DELAY_MS: ${OPS_ALERT_HEALTH_CHECK_FIXED_DELAY_MS:-30000}
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend-build:
    build:
      context: ../vue-front
      dockerfile: Dockerfile
      target: export
    container_name: reallife-frontend-build
    command: ["sh", "-c", "rm -rf /dist/* && cp -r /out/dist/* /dist/ && echo 'front dist exported'"]
    volumes:
      - reallife_front_dist:/dist

  nginx:
    image: nginx:1.27-alpine
    container_name: reallife-nginx
    restart: unless-stopped
    depends_on:
      - app
      - frontend-build
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - reallife_front_dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  reallife_mysql_data:
  reallife_front_dist:
  reallife_elasticsearch_data:
