spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:backend}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:backend}
    password: ${DB_PASSWORD:backendpw}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

app:
  search:
    elastic:
      enabled: ${SEARCH_ELASTIC_ENABLED:true}
      base-url: ${SEARCH_ELASTIC_BASE_URL:http://elasticsearch:9200}
      index-name: ${SEARCH_ELASTIC_INDEX_NAME:reallife_search}
      api-key: ${SEARCH_ELASTIC_API_KEY:}
