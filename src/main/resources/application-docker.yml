spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/backend?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:backend}
    password: ${DB_PASSWORD:backendpw}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  mvc:
    async:
      request-timeout: -1

app:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  search:
    elastic:
      enabled: ${SEARCH_ELASTIC_ENABLED:true}
      base-url: ${SEARCH_ELASTIC_BASE_URL:http://elasticsearch:9200}
      index-name: ${SEARCH_ELASTIC_INDEX_NAME:reallife_search}
      api-key: ${SEARCH_ELASTIC_API_KEY:}
      reindex-admin-token: ${SEARCH_ELASTIC_REINDEX_ADMIN_TOKEN:}
