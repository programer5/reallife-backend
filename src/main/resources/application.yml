spring:
  application:
    name: reallife-backend
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: BINARY
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

info:
  app:
    version: 0.0.1-SNAPSHOT

  Jackson:
    time-zone: Asia/Seoul

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_KEY_64_CHARS_MIN_0123456789abcdef}
  access-token-exp-minutes: ${JWT_ACCESS_TOKEN_EXP_MINUTES:15}
  refresh-token-exp-days: ${JWT_REFRESH_TOKEN_EXP_DAYS:14}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

logging:
  level:
    org.flywaydb: info
    com.example.backend.config.logging.RequestLoggingFilter: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n"

app:
  cookie:
    secure-mode: auto
    same-site: Lax
    access-max-age-seconds: 900
    refresh-max-age-seconds: 1209600
    refresh-path: /api/auth
  public-base-url: ${PUBLIC_BASE_URL:http://localhost}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

ops:
  alert:
    enabled: ${OPS_ALERT_ENABLED:false}
    cooldown-minutes: ${OPS_ALERT_COOLDOWN_MINUTES:10}
    health-check-initial-delay-ms: ${OPS_ALERT_HEALTH_CHECK_INITIAL_DELAY_MS:15000}
    health-check-fixed-delay-ms: ${OPS_ALERT_HEALTH_CHECK_FIXED_DELAY_MS:30000}
    slack:
      webhook-url: ${OPS_ALERT_SLACK_WEBHOOK_URL:}
      username: ${OPS_ALERT_SLACK_USERNAME:RealLife Ops}
      icon-emoji: ${OPS_ALERT_SLACK_ICON_EMOJI::rotating_light:}