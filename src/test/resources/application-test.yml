spring:
  testcontainers:
    service-connection:
      enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: false

  sql:
    init:
      mode: never

  mvc:
    async:
      request-timeout: 1000

jwt:
  secret: "test-secret-key-please-change-32chars!!"
  access-token-exp-minutes: 60
app:
  search:
    elastic:
      enabled: ${SEARCH_ELASTIC_ENABLED:false}
      base-url: ${SEARCH_ELASTIC_BASE_URL:http://localhost:9200}
      index-name: ${SEARCH_ELASTIC_INDEX_NAME:reallife_search}
      api-key: ${SEARCH_ELASTIC_API_KEY:}
      username: ${SEARCH_ELASTIC_USERNAME:}
      password: ${SEARCH_ELASTIC_PASSWORD:}
